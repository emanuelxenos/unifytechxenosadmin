name: unifytechxenosadmin
description: "ERP Admin Desktop - Sistema de Gestão de Mercado"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State Management (Riverpod com code generation)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP Client
  dio: ^5.7.0

  # Navigation
  go_router: ^14.8.1

  # Local Storage
  shared_preferences: ^2.5.3

  # Charts
  fl_chart: ^0.70.2

  # Typography
  google_fonts: ^6.2.1

  # Internationalization
  intl: ^0.20.2

  # WebSocket
  web_socket_channel: ^3.0.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
